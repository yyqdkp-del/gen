<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>根·中文 · 汉字解码器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1A1208;
  --paper: #F5EFE3;
  --red: #B5341A;
  --red-light: #F0E0DB;
  --gold: #B8860B;
  --gold-light: #F5EDD0;
  --green: #2D6A4F;
  --green-light: #D4EAD8;
  --purple: #6C3483;
  --purple-light: #E8D5F0;
  --muted: #7A6A5A;
  --border: rgba(26,18,8,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Serif SC', serif;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
text-align: center;
padding: 40px 20px 0;
position: relative;
}
.header-back {
position: absolute; left: 20px; top: 44px;
font-size: 13px; color: var(–muted);
text-decoration: none; display: flex; align-items: center; gap: 4px;
}
.header-back:hover { color: var(–red); }
.header h1 {
font-family: ‘Ma Shan Zheng’, serif;
font-size: 32px; color: var(–red);
letter-spacing: 4px; margin-bottom: 6px;
}
.header p { font-size: 13px; color: var(–muted); letter-spacing: 1px; }

/* ── TABS ── */
.tabs {
display: flex; gap: 0;
max-width: 680px; margin: 32px auto 0;
border-bottom: 2px solid var(–border);
padding: 0 20px;
}
.tab {
flex: 1; padding: 12px 8px;
font-size: 14px; font-weight: 600;
color: var(–muted); cursor: pointer;
border-bottom: 2px solid transparent;
margin-bottom: -2px;
transition: all 0.2s;
text-align: center;
font-family: ‘Noto Serif SC’, serif;
display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.tab .tab-icon { font-size: 20px; }
.tab .tab-label { font-size: 13px; }
.tab .tab-en { font-size: 10px; color: var(–muted); letter-spacing: 1px; opacity: 0.7; }
.tab:hover { color: var(–ink); }
.tab.active { color: var(–red); border-bottom-color: var(–red); }

/* ── PANELS ── */
.panel { display: none; max-width: 680px; margin: 0 auto; padding: 32px 20px 60px; }
.panel.active { display: block; }

/* ── INPUT AREA ── */
.input-section { margin-bottom: 24px; }
.input-label { font-size: 11px; letter-spacing: 2px; color: var(–muted); text-transform: uppercase; margin-bottom: 10px; display: block; }
.input-row { display: flex; gap: 10px; }
.char-input {
font-size: 36px; width: 72px; height: 64px; text-align: center;
border: 2px solid var(–border); border-radius: 8px;
font-family: ‘Ma Shan Zheng’, serif; color: var(–ink);
background: #fff; outline: none;
transition: border-color 0.2s;
box-shadow: 0 2px 8px rgba(26,18,8,0.06);
}
.char-input:focus { border-color: var(–red); }
.text-input {
flex: 1; padding: 14px 16px;
border: 2px solid var(–border); border-radius: 8px;
font-family: ‘Noto Serif SC’, serif; font-size: 15px;
color: var(–ink); background: #fff; outline: none;
transition: border-color 0.2s; resize: none;
box-shadow: 0 2px 8px rgba(26,18,8,0.06);
line-height: 1.6;
}
.text-input:focus { border-color: var(–red); }
.keyword-input {
width: 100%; padding: 12px 16px; margin-top: 10px;
border: 1.5px solid var(–border); border-radius: 8px;
font-family: ‘Noto Serif SC’, serif; font-size: 14px;
color: var(–ink); background: #fff; outline: none;
transition: border-color 0.2s;
}
.keyword-input:focus { border-color: var(–green); }
.go-btn {
height: 64px; padding: 0 28px; border-radius: 8px;
background: linear-gradient(180deg, #C84030 0%, #A93226 100%);
color: #fff; border: none; cursor: pointer;
font-size: 15px; font-weight: 600;
font-family: ‘Noto Serif SC’, serif;
box-shadow: 0 4px 14px rgba(192,57,43,0.3);
transition: all 0.2s; white-space: nowrap;
}
.go-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(192,57,43,0.35); }
.go-btn:disabled { background: #C8B8A8; box-shadow: none; cursor: not-allowed; transform: none; }
.go-btn-wide {
width: 100%; height: 52px; border-radius: 8px; margin-top: 12px;
background: linear-gradient(180deg, #C84030 0%, #A93226 100%);
color: #fff; border: none; cursor: pointer;
font-size: 15px; font-weight: 600;
font-family: ‘Noto Serif SC’, serif;
box-shadow: 0 4px 14px rgba(192,57,43,0.25);
transition: all 0.2s;
}
.go-btn-wide:hover { transform: translateY(-1px); }
.go-btn-wide:disabled { background: #C8B8A8; box-shadow: none; cursor: not-allowed; transform: none; }

/* ── CHIPS ── */
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; align-items: center; }
.chip-label { font-size: 11px; color: var(–muted); }
.chip {
padding: 4px 12px; border-radius: 20px; background: #fff;
border: 1px solid var(–border);
font-family: ‘Noto Serif SC’, serif; font-size: 15px;
cursor: pointer; color: var(–ink); transition: all 0.15s;
}
.chip:hover { border-color: var(–red); color: var(–red); background: var(–red-light); }
.chip.cy { font-size: 13px; }

/* ── RESULT CARDS ── */
.result { display: none; margin-top: 8px; }
.result.show { display: block; }
.loading {
text-align: center; padding: 40px;
color: var(–muted); font-size: 14px;
}
.loading-dots::after {
content: ‘’; animation: dots 1.2s infinite;
}
@keyframes dots {
0%,20% { content: ‘。’; }
40%,60% { content: ‘。。’; }
80%,100% { content: ‘。。。’; }
}

/* ── HANZI RESULT ── */
.hz-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(26,18,8,0.08); border: 1px solid var(–border); }
.hz-hero {
background: linear-gradient(135deg, #F8EEE8, #F0E4D0);
padding: 28px; display: flex; gap: 20px; align-items: center;
border-bottom: 1px solid var(–border);
}
.hz-char { font-family: ‘Ma Shan Zheng’, serif; font-size: 80px; color: var(–red); line-height: 1; min-width: 90px; text-align: center; }
.hz-meta-title { font-size: 22px; color: var(–muted); font-family: ‘Lora’, serif; margin-bottom: 4px; }
.hz-meta-meaning { font-size: 16px; color: var(–ink); margin-bottom: 10px; }
.hz-level { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 11px; font-weight: 700; background: var(–gold-light); color: var(–gold); }
.hz-row { padding: 18px 24px; border-bottom: 1px solid var(–border); }
.hz-row:last-child { border-bottom: none; }
.hz-row-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(–muted); margin-bottom: 8px; }
.hz-parts { display: flex; gap: 8px; flex-wrap: wrap; }
.hz-part { background: var(–red-light); color: var(–red); padding: 4px 14px; border-radius: 4px; font-family: ‘Ma Shan Zheng’, serif; font-size: 20px; }
.hz-story { font-size: 15px; color: var(–ink); line-height: 1.9; }
.hz-scene { font-size: 14px; color: #3A5A3A; line-height: 1.8; background: var(–green-light); padding: 12px 16px; border-radius: 6px; border-left: 3px solid var(–green); }
.hz-mom { font-size: 14px; color: var(–ink); line-height: 1.8; }
.hz-mom-q { padding: 6px 0; display: flex; gap: 8px; }
.hz-mom-q::before { content: ‘💬’; flex-shrink: 0; }
.hz-ext { display: flex; flex-wrap: wrap; gap: 8px; }
.hz-ext-item { background: #F0F4F8; padding: 6px 14px; border-radius: 4px; font-size: 13px; color: var(–blue, #1A4A7A); }
.hz-cy { background: var(–gold-light); border-radius: 8px; padding: 16px 20px; }
.hz-cy-word { font-family: ‘Ma Shan Zheng’, serif; font-size: 28px; color: var(–gold); margin-bottom: 6px; }
.hz-cy-story { font-size: 13px; color: #6A5A2A; line-height: 1.7; }

/* ── CHENGYU RESULT ── */
.cy-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(26,18,8,0.08); border: 1px solid var(–border); }
.cy-hero {
background: linear-gradient(135deg, #F5EDD0, #EDE0B8);
padding: 28px; border-bottom: 1px solid var(–border);
}
.cy-original { font-size: 13px; color: var(–muted); margin-bottom: 4px; }
.cy-issue { font-size: 13px; color: var(–red); background: var(–red-light); padding: 4px 10px; border-radius: 4px; display: inline-block; margin-bottom: 16px; }
.cy-word { font-family: ‘Ma Shan Zheng’, serif; font-size: 52px; color: var(–gold); line-height: 1; margin-bottom: 4px; }
.cy-pinyin { font-size: 14px; color: var(–muted); }
.cy-row { padding: 18px 24px; border-bottom: 1px solid var(–border); }
.cy-row:last-child { border-bottom: none; }
.cy-row-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(–muted); margin-bottom: 8px; }
.cy-meaning { font-size: 15px; color: var(–ink); line-height: 1.8; }
.cy-scene { font-size: 14px; color: #3A5A3A; line-height: 1.8; background: var(–green-light); padding: 12px 16px; border-radius: 6px; border-left: 3px solid var(–green); }
.cy-mom-script { font-size: 14px; color: var(–ink); line-height: 1.9; background: #F8F4EE; padding: 16px; border-radius: 8px; border-left: 3px solid var(–gold); font-style: italic; }
.cy-similar { display: flex; gap: 8px; flex-wrap: wrap; }
.cy-similar-item { background: var(–gold-light); color: var(–gold); padding: 4px 14px; border-radius: 4px; font-family: ‘Ma Shan Zheng’, serif; font-size: 18px; }

/* ── WRITING RESULT ── */
.wr-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(26,18,8,0.08); border: 1px solid var(–border); }
.wr-hero {
background: linear-gradient(135deg, #E8D5F0, #D8C0E8);
padding: 24px; border-bottom: 1px solid var(–border);
}
.wr-hero-label { font-size: 11px; letter-spacing: 2px; color: var(–purple); text-transform: uppercase; margin-bottom: 8px; }
.wr-original-text { font-size: 14px; color: #5A3A5A; line-height: 1.7; font-style: italic; }
.wr-row { padding: 18px 24px; border-bottom: 1px solid var(–border); }
.wr-row:last-child { border-bottom: none; }
.wr-row-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(–muted); margin-bottom: 8px; }
.wr-draft { font-size: 16px; color: var(–ink); line-height: 2; font-family: ‘Ma Shan Zheng’, serif; background: #F8F4EE; padding: 16px; border-radius: 8px; }
.wr-blanks { font-size: 16px; color: var(–ink); line-height: 2; background: var(–purple-light); padding: 16px; border-radius: 8px; }
.wr-blank { display: inline-block; width: 40px; border-bottom: 2px solid var(–purple); margin: 0 2px; text-align: center; color: var(–purple); font-weight: 700; }
.wr-mom-script { font-size: 14px; color: var(–ink); line-height: 1.9; background: #F8F4EE; padding: 16px; border-radius: 8px; border-left: 3px solid var(–purple); font-style: italic; }
.wr-keywords { display: flex; gap: 8px; flex-wrap: wrap; }
.wr-keyword { background: var(–purple-light); color: var(–purple); padding: 4px 12px; border-radius: 4px; font-family: ‘Ma Shan Zheng’, serif; font-size: 18px; }
.wr-tips { font-size: 13px; color: var(–muted); line-height: 1.8; background: #F5F5F5; padding: 12px 16px; border-radius: 6px; }

.error-box { background: #FEF0EE; border: 1px solid #F5B7B1; border-radius: 8px; padding: 16px; color: var(–red); font-size: 14px; margin-top: 16px; }
</style>

</head>
<body>

<div class="header">
  <a href="https://yyqdkp-del.github.io/Genchinese" class="header-back">← 返回根·中文主页</a>
  <h1>根·中文解码器</h1>
  <p>汉字拆解 · 成语解读 · 文字化过渡</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('hanzi')">
    <span class="tab-icon">🧩</span>
    <span class="tab-label">汉字拆解</span>
    <span class="tab-en">Decoder</span>
  </div>
  <div class="tab" onclick="switchTab('chengyu')">
    <span class="tab-icon">🌟</span>
    <span class="tab-label">成语解读</span>
    <span class="tab-en">Idioms</span>
  </div>
  <div class="tab" onclick="switchTab('writing')">
    <span class="tab-icon">✍️</span>
    <span class="tab-label">文字化过渡</span>
    <span class="tab-en">Writing</span>
  </div>
</div>

<!-- 汉字拆解 -->

<div class="panel active" id="panel-hanzi">
  <div class="input-section">
    <span class="input-label">输入一个汉字</span>
    <div class="input-row">
      <input class="char-input" id="hanziInput" type="text" maxlength="1" placeholder="字">
      <button class="go-btn" id="hanziBtn" onclick="runHanzi()">🔍 拆解</button>
    </div>
    <div class="chips">
      <span class="chip-label">体验：</span>
      <span class="chip" onclick="setHanzi('明')">明</span>
      <span class="chip" onclick="setHanzi('休')">休</span>
      <span class="chip" onclick="setHanzi('森')">森</span>
      <span class="chip" onclick="setHanzi('闻')">闻</span>
      <span class="chip" onclick="setHanzi('家')">家</span>
      <span class="chip" onclick="setHanzi('笑')">笑</span>
      <span class="chip" onclick="setHanzi('飞')">飞</span>
      <span class="chip" onclick="setHanzi('鱼')">鱼</span>
    </div>
  </div>
  <div class="result" id="hanziResult"></div>
</div>

<!-- 成语解读 -->

<div class="panel" id="panel-chengyu">
  <div class="input-section">
    <span class="input-label">输入孩子说的英式中文 / 一个情境</span>
    <textarea class="text-input" id="chengyuInput" rows="3" placeholder="例如：very many people at the market / 我们去夜市，人超级多 / I did it all at once"></textarea>
    <div class="chips" style="margin-top:10px;">
      <span class="chip-label">试试：</span>
      <span class="chip cy" onclick="setCY('very many people')">very many people</span>
      <span class="chip cy" onclick="setCY('我做事很快，一下子就完成了')">一下子就完成</span>
      <span class="chip cy" onclick="setCY('去大象营看大象，很开心')">看大象很开心</span>
    </div>
    <button class="go-btn-wide" id="chengyuBtn" onclick="runChengyu()">🌟 生成成语脚本</button>
  </div>
  <div class="result" id="chengyuResult"></div>
</div>

<!-- 文字化过渡 -->

<div class="panel" id="panel-writing">
  <div class="input-section">
    <span class="input-label">孩子的口述内容（用语音输入或直接打）</span>
    <textarea class="text-input" id="writingInput" rows="4" placeholder="例如：今天我们去夜市，那里很多人，我吃了芒果糯米饭，很好吃，我很开心"></textarea>
    <input class="keyword-input" id="keywordsInput" type="text" placeholder="本周学的字/词（选填，如：明亮、休息、热闹）">
    <div class="chips" style="margin-top:10px;">
      <span class="chip-label">试试：</span>
      <span class="chip cy" onclick="setWriting('今天去夜市，人很多很多，吃了芒果糯米饭，超级好吃')">夜市经历</span>
      <span class="chip cy" onclick="setWriting('今天去大象营，大象鼻子很长，我摸了它，有点害怕但很好玩')">大象营经历</span>
      <span class="chip cy" onclick="setWriting('今天下雨了，我在家看书，然后和妈妈一起做饼干')">下雨天在家</span>
    </div>
    <button class="go-btn-wide" id="writingBtn" onclick="runWriting()" style="background:linear-gradient(180deg,#7D3E9A 0%,#6C3483 100%);box-shadow:0 4px 14px rgba(108,52,131,0.25);">✍️ 生成作文脚本</button>
  </div>
  <div class="result" id="writingResult"></div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['hanzi','chengyu','writing'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

function setHanzi(c) { document.getElementById('hanziInput').value = c; }
function setCY(t) { document.getElementById('chengyuInput').value = t; }
function setWriting(t) { document.getElementById('writingInput').value = t; }

async function callAPI(body) {
  const res = await fetch('/api/generate', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  return res.json();
}

// ── 汉字拆解 ──
async function runHanzi() {
  const char = document.getElementById('hanziInput').value.trim();
  if (!char) return;
  const btn = document.getElementById('hanziBtn');
  const result = document.getElementById('hanziResult');
  btn.disabled = true; btn.textContent = '生成中…';
  result.className = 'result show';
  result.innerHTML = '<div class="loading">正在拆解「' + char + '」<span class="loading-dots"></span></div>';
  try {
    const d = await callAPI({ mode:'hanzi', char });
    if (d.error) { result.innerHTML = '<div class="error-box">⚠️ ' + d.error + '</div>'; return; }
    result.innerHTML = `
      <div class="hz-card">
        <div class="hz-hero">
          <div class="hz-char">${char}</div>
          <div>
            <div class="hz-meta-title">${d.pinyin || ''}</div>
            <div class="hz-meta-meaning">${d.meaning || ''}</div>
            <span class="hz-level">${d.level || ''}</span>
          </div>
        </div>
        <div class="hz-row">
          <div class="hz-row-label">字的零件</div>
          <div class="hz-parts">${(d.parts||[]).map(p=>`<div class="hz-part" title="${p.name}">${p.char}</div>`).join('')}</div>
          <div style="margin-top:10px;font-size:13px;color:var(--muted)">${(d.parts||[]).map(p=>`${p.char}＝${p.name}（${p.image}）`).join(' · ')}</div>
        </div>
        <div class="hz-row">
          <div class="hz-row-label">造字故事</div>
          <div class="hz-story">${d.story||''}</div>
        </div>
        <div class="hz-row">
          <div class="hz-row-label">清迈场景</div>
          <div class="hz-scene">🌿 ${d.scene||''}</div>
        </div>
        <div class="hz-row">
          <div class="hz-row-label">妈妈台词 💬</div>
          <div class="hz-mom">${(d.mom_questions||[]).map(q=>`<div class="hz-mom-q">${q}</div>`).join('')}</div>
        </div>
        ${d.extension?.length ? `<div class="hz-row">
          <div class="hz-row-label">延伸词汇</div>
          <div class="hz-ext">${d.extension.map(e=>`<div class="hz-ext-item">${e}</div>`).join('')}</div>
        </div>` : ''}
        ${d.chengyu ? `<div class="hz-row">
          <div class="hz-row-label">相关成语</div>
          <div class="hz-cy">
            <div class="hz-cy-word">${d.chengyu}</div>
            <div class="hz-cy-story">${d.cy_story||''}</div>
          </div>
        </div>` : ''}
      </div>`;
  } catch(e) {
    result.innerHTML = '<div class="error-box">⚠️ 网络错误，请重试</div>';
  } finally {
    btn.disabled = false; btn.textContent = '🔍 拆解';
  }
}

// ── 成语解读 ──
async function runChengyu() {
  const sentence = document.getElementById('chengyuInput').value.trim();
  if (!sentence) return;
  const btn = document.getElementById('chengyuBtn');
  const result = document.getElementById('chengyuResult');
  btn.disabled = true; btn.textContent = '生成中…';
  result.className = 'result show';
  result.innerHTML = '<div class="loading">正在生成成语脚本<span class="loading-dots"></span></div>';
  try {
    const d = await callAPI({ mode:'chengyu', sentence });
    if (d.error) { result.innerHTML = '<div class="error-box">⚠️ ' + d.error + '</div>'; return; }
    result.innerHTML = `
      <div class="cy-card">
        <div class="cy-hero">
          <div class="cy-original">孩子说：「${d.original||sentence}」</div>
          <div class="cy-issue">${d.issue||''}</div>
          <div class="cy-word">${d.chengyu||''}</div>
          <div class="cy-pinyin">${d.pinyin||''}</div>
        </div>
        <div class="cy-row">
          <div class="cy-row-label">成语含义</div>
          <div class="cy-meaning">${d.meaning||''}</div>
        </div>
        <div class="cy-row">
          <div class="cy-row-label">来源故事</div>
          <div class="cy-meaning">${d.story||''}</div>
        </div>
        <div class="cy-row">
          <div class="cy-row-label">清迈场景</div>
          <div class="cy-scene">🌿 ${d.chiangmai_scene||''}</div>
        </div>
        <div class="cy-row">
          <div class="cy-row-label">妈妈台词 💬</div>
          <div class="cy-mom-script">${d.mom_script||''}</div>
        </div>
        ${d.similar?.length ? `<div class="cy-row">
          <div class="cy-row-label">近义成语</div>
          <div class="cy-similar">${d.similar.map(s=>`<div class="cy-similar-item">${s}</div>`).join('')}</div>
        </div>` : ''}
      </div>`;
  } catch(e) {
    result.innerHTML = '<div class="error-box">⚠️ 网络错误，请重试</div>';
  } finally {
    btn.disabled = false; btn.textContent = '🌟 生成成语脚本';
  }
}

// ── 文字化过渡 ──
async function runWriting() {
  const sentence = document.getElementById('writingInput').value.trim();
  const keywords = document.getElementById('keywordsInput').value.trim();
  if (!sentence) return;
  const btn = document.getElementById('writingBtn');
  const result = document.getElementById('writingResult');
  btn.disabled = true; btn.textContent = '生成中…';
  result.className = 'result show';
  result.innerHTML = '<div class="loading">正在生成作文脚本<span class="loading-dots"></span></div>';
  try {
    const d = await callAPI({ mode:'writing', sentence, keywords });
    if (d.error) { result.innerHTML = '<div class="error-box">⚠️ ' + d.error + '</div>'; return; }
    result.innerHTML = `
      <div class="wr-card">
        <div class="wr-hero">
          <div class="wr-hero-label">孩子口述</div>
          <div class="wr-original-text">「${d.original||sentence}」</div>
        </div>
        <div class="wr-row">
          <div class="wr-row-label">书面作文版本</div>
          <div class="wr-draft">${d.draft||''}</div>
        </div>
        ${d.keywords_used?.length ? `<div class="wr-row">
          <div class="wr-row-label">已融入的关键字</div>
          <div class="wr-keywords">${d.keywords_used.map(k=>`<div class="wr-keyword">${k}</div>`).join('')}</div>
        </div>` : ''}
        ${d.fill_blanks ? `<div class="wr-row">
          <div class="wr-row-label">填空练习版 ✏️</div>
          <div class="wr-blanks">${d.fill_blanks}</div>
        </div>` : ''}
        <div class="wr-row">
          <div class="wr-row-label">妈妈台词 💬</div>
          <div class="wr-mom-script">${d.mom_script||''}</div>
        </div>
        ${d.tips ? `<div class="wr-row">
          <div class="wr-row-label">小贴士</div>
          <div class="wr-tips">💡 ${d.tips}</div>
        </div>` : ''}
      </div>`;
  } catch(e) {
    result.innerHTML = '<div class="error-box">⚠️ 网络错误，请重试</div>';
  } finally {
    btn.disabled = false; btn.textContent = '✍️ 生成作文脚本';
  }
}

// 回车触发汉字拆解
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('hanziInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') runHanzi();
  });
  // URL参数自动填入
  const params = new URLSearchParams(window.location.search);
  const char = params.get('char');
  if (char) {
    document.getElementById('hanziInput').value = char;
    runHanzi();
  }
});
</script>
